<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swift To The Lyric — search Taylor Swift lyrics</title>
<meta name="description" content="Search every line of Taylor Swift's lyrics. Type a word to see every song it appears in, with the section and line number. Works offline, no tracking." />
<meta name="theme-color" content="#f5efe1" />

<!-- Open Graph / social preview -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Swift To The Lyric" />
<meta property="og:title" content="Swift To The Lyric" />
<meta property="og:description" content="Search every line of Taylor Swift's lyrics. See every song a word appears in, with the section and line." />
<meta property="og:url" content="https://swiftassociation.com/search/" />
<meta property="og:image" content="https://swiftassociation.com/icons/og-image-search.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Swift To The Lyric — a magnifying glass over a highlighted lyric on ruled notebook paper." />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Swift To The Lyric" />
<meta name="twitter:description" content="Search every line of Taylor Swift's lyrics. See every song a word appears in, with the section and line." />
<meta name="twitter:image" content="https://swiftassociation.com/icons/og-image-search.png" />

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="The Lyric" />
<link rel="icon" type="image/svg+xml" href="../icons/favicon-search.svg" />
<link rel="apple-touch-icon" href="../icons/apple-touch-icon-search.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="search.css" />
</head>
<body>
<div id="era" class="sx-era" aria-hidden="true"></div>
<header class="sx-top">
  <a class="sx-back" href="../index.html">&larr; the game</a>
  <h1 class="sx-title">Swift To The Lyric</h1>
  <p class="sx-tagline">search every line of the lyrics</p>
</header>

<main class="sx-page">
  <div class="sx-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <circle cx="11" cy="11" r="7" /><line x1="16.5" y1="16.5" x2="21" y2="21" />
    </svg>
    <span id="chips" class="sx-chips"></span>
    <input id="q" type="search" autocomplete="off" autocapitalize="off" spellcheck="false"
      placeholder="search the lyrics&hellip;" aria-label="Search Taylor Swift lyrics" />
  </div>

  <div class="sx-controls">
    <div class="sx-seg" role="group" aria-label="Match mode">
      <button type="button" data-mode="stem" title="Match the word and its forms (love, lover, loved)">stem</button>
      <button type="button" data-mode="exact" title="Match the exact word only">exact</button>
      <button type="button" data-mode="fuzzy" title="Tolerate typos and near-spellings">fuzzy</button>
    </div>
    <div class="sx-seg" role="group" aria-label="Result layout">
      <button type="button" data-view="grouped" title="Group hits by song">grouped</button>
      <button type="button" data-view="flat" title="One flat list of every matching line">flat</button>
    </div>
    <label class="sx-filter">in <select id="section" aria-label="Filter by section type"></select></label>
    <label class="sx-filter">word <select id="pos" aria-label="Filter by where the word sits in the line">
      <option value="any">anywhere</option>
      <option value="start">starts the line</option>
      <option value="end">ends the line</option>
    </select></label>
  </div>

  <div id="counter" class="sx-counter" aria-live="polite"></div>
  <div id="bar" class="sx-bar" aria-hidden="true"></div>
  <div id="concord" class="sx-concord" aria-live="polite"></div>
  <div id="results" class="sx-results"></div>
</main>

<nav id="rail" class="sx-rail" aria-label="Jump to an album"></nav>

<footer class="sx-foot">
  <p>Lyrics are the work of Taylor Swift and her co-writers. Swift To The Lyric is a free,
     fan-made way to search and study them. It runs entirely in your browser, works offline,
     and tracks nothing.</p>
  <p><a href="../index.html">&larr; back to the game</a></p>
</footer>

<script type="module" src="search.js"></script>
<script>
  // Register the shared root service worker (scope "/") so the searcher works
  // offline even when opened directly, not only after visiting the game first.
  if ("serviceWorker" in navigator) {
    addEventListener("load", () => navigator.serviceWorker.register("../sw.js").catch(() => {}));
  }
</script>
</body>
</html>
